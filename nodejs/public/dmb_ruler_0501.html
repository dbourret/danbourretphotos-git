<!DOCTYPE html>
<html>
<head>
  <title>Admin Pricing</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 30px;
      margin: 0;
    }

    .hidden {
      display: none;
    }

    .card {
      max-width: 1100px;
      margin: 0 auto;
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px;
      box-sizing: border-box;
    }

    .login-card {
      max-width: 420px;
      margin: 80px auto;
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px;
      box-sizing: border-box;
    }

    h1, h2 {
      margin-top: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input {
      padding: 10px 12px;
      min-width: 120px;
      background: #101010;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      box-sizing: border-box;
    }

    #search-box {
      min-width: 260px;
    }

    button {
      padding: 10px 14px;
      cursor: pointer;
      border: 1px solid #444;
      border-radius: 8px;
      background: #222;
      color: #fff;
    }

    button:hover {
      background: #2b2b2b;
    }

    .danger {
      border-color: #6b2b2b;
    }

    .status {
      margin: 12px 0 18px;
      min-height: 20px;
      color: #d6b36a;
    }

    .error {
      color: #ff8f8f;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #141414;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #2d2d2d;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #1d1d1d;
    }

    .admin-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.tab-btn {
  padding: 10px 14px;
  cursor: pointer;
  border: 1px solid #444;
  border-radius: 8px;
  background: #222;
  color: #fff;
}

.tab-btn:hover {
  background: #2b2b2b;
}

.tab-btn.active {
  background: #d6b36a;
  color: #111;
  border-color: #d6b36a;
}

.tab-section {
  display: none;
}

.tab-section.active {
  display: block;
}
  </style>
</head>
<body>

  <div id="login-view" class="login-card">
    <h1>Admin Login</h1>
    <p>Enter your admin password to manage pricing.</p>

    <div class="form-row" style="flex-direction: column;">
      <input type="password" id="admin-password-input" placeholder="Admin password">
      <button onclick="login()">Login</button>
    </div>

    <div id="login-status" class="status"></div>
  </div>

  <div id="admin-view" class="card hidden">
  <div class="topbar">
    <h1 style="margin:0;">Pricing Admin</h1>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="admin-tabs">
    <button class="tab-btn active" data-tab="pricing-tab">Pricing</button>
    <button class="tab-btn" data-tab="orders-tab">Orders</button>
    <button class="tab-btn" data-tab="contacts-tab">Contact Submissions</button>
  </div>

  <div id="admin-status" class="status"></div>

  <div id="pricing-tab" class="tab-section active">
    <h2>Add New Price</h2>

    <div class="form-row">
      <input type="text" id="new-material" placeholder="Material">
      <input type="text" id="new-size" placeholder="Size">
      <input type="number" id="new-price" placeholder="Price" step="0.01">
      <button onclick="addPrice()">Add Price</button>
    </div>

    <div style="margin: 20px 0;">
      <input
        type="text"
        id="search-box"
        placeholder="Search by material or size"
        oninput="loadPricing()"
      >
    </div>

    <table id="pricing-table">
      <thead>
        <tr>
          <th>Material</th>
          <th>Size</th>
          <th>Price</th>
          <th>Save</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="orders-tab" class="tab-section">
    <h2 style="margin-top: 36px;">Orders</h2>

    <div style="margin: 12px 0 18px;">
      <button onclick="loadOrders()">Refresh Orders</button>
    </div>

    <table id="orders-table">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer</th>
          <th>Email</th>
          <th>Total</th>
          <th>Date</th>
          <th>Status</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="contacts-tab" class="tab-section">
  <h2>Contact Submissions</h2>

  <div style="margin: 12px 0 18px;">
    <button onclick="loadContactSubmissions()">Refresh Contact Submissions</button>
  </div>

  <table id="contact-submissions-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Subject</th>
        <th>Date</th>
        <th>Message</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
let adminPassword = "";

function initializeTabs() {
        console.log("initializeTabs ran");

  const buttons = document.querySelectorAll(".tab-btn");
  const sections = document.querySelectorAll(".tab-section");

  buttons.forEach(btn => {
    btn.addEventListener("click", async () => {
            console.log("tab clicked:", btn.dataset.tab);

      buttons.forEach(b => b.classList.remove("active"));
      sections.forEach(s => s.classList.remove("active"));

      btn.classList.add("active");

      const target = btn.dataset.tab;
      const section = document.getElementById(target);

      if (section) {
        section.classList.add("active");
      }

      if (target === "orders-tab") {
        await loadOrders();
      }

      if (target === "contacts-tab") {
  await loadContactSubmissions();
}

      if (target === "pricing-tab") {
        await loadPricing();
      }
    });
  });
}

function setStatus(message, isError = false, targetId = "admin-status") {
  const el = document.getElementById(targetId);
  if (!el) return;

  el.textContent = message || "";
  el.classList.toggle("error", isError);
}

function showAdminView() {
  document.getElementById("login-view").classList.add("hidden");
  document.getElementById("admin-view").classList.remove("hidden");
}

function showLoginView() {
  document.getElementById("admin-view").classList.add("hidden");
  document.getElementById("login-view").classList.remove("hidden");
}

async function login() {
  const passwordInput = document.getElementById("admin-password-input");
  const password = passwordInput.value.trim();

  if (!password) {
    setStatus("Please enter your password.", true, "login-status");
    return;
  }

  adminPassword = password;

  const res = await fetch("/api/orders", {
    headers: {
      "Authorization": `Bearer ${adminPassword}`
    }
  });

  if (!res.ok) {
    if (res.status === 401 || res.status === 403) {
      setStatus("Login failed. Check your password.", true, "login-status");
      return;
    }

    setStatus("Login failed due to a server error.", true, "login-status");
    return;
  }

  sessionStorage.setItem("adminPassword", adminPassword);
  passwordInput.value = "";
  setStatus("", false, "login-status");
  showAdminView();
  setStatus("Logged in successfully.");
  loadPricing();
}

function logout() {
  adminPassword = "";
  sessionStorage.removeItem("adminPassword");
  showLoginView();
  setStatus("", false, "admin-status");
  setStatus("Logged out.", false, "login-status");
}

async function loadPricing() {
  const res = await fetch("/api/pricing", {
    headers: {
      "Authorization": `Bearer ${adminPassword}`
    }
  });

  if (!res.ok) {
    if (res.status === 401 || res.status === 403) {
      logout();
      setStatus("Your session expired. Please log in again.", true, "login-status");
      return;
    }

    setStatus("Failed to load pricing.", true);
    return;
  }

  const data = await res.json();
  const searchTerm = document.getElementById("search-box")?.value.toLowerCase().trim() || "";

  const filteredData = data.filter(row => {
    const material = String(row.material || "").toLowerCase();
    const size = String(row.size || "").toLowerCase();
    return material.includes(searchTerm) || size.includes(searchTerm);
  });

  const tbody = document.querySelector("#pricing-table tbody");
  tbody.innerHTML = "";

  filteredData.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.material}</td>
      <td>${row.size}</td>
      <td>
        <input type="number" step="0.01" value="${row.price}" id="price-${row.id}">
      </td>
      <td>
        <button onclick="savePrice(${row.id})">Save</button>
      </td>
      <td>
        <button class="danger" onclick="deletePrice(${row.id})">Delete</button>
      </td>
    `;

    tbody.appendChild(tr);
  });

  setStatus(`Loaded ${filteredData.length} pricing row(s).`);
}

async function loadContactSubmissions() {
  console.log("Loading contact submissions...");

  const res = await fetch("/api/contact-submissions", {
    headers: {
      "Authorization": `Bearer ${adminPassword}`
    }
  });

  if (!res.ok) {
    if (res.status === 401 || res.status === 403) {
      logout();
      setStatus("Session expired. Please log in again.", true);
      return;
    }

    setStatus("Failed to load contact submissions.", true);
    return;
  }

  const data = await res.json();

  console.log("Contact submissions:", data);

  const tbody = document.querySelector("#contact-submissions-table tbody");
  if (!tbody) return;

  tbody.innerHTML = "";

  data.forEach((submission) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${submission.id || ""}</td>
      <td>${submission.name || ""}</td>
      <td>${submission.email || ""}</td>
      <td>${submission.subject || ""}</td>
      <td>${formatDate(submission.created_at)}</td>
      <td style="max-width: 320px; white-space: pre-wrap;">${submission.message || ""}</td>
    `;

    tbody.appendChild(tr);
  });

  setStatus(`Loaded ${data.length} contact submission(s).`);
}

async function loadOrders() {
  const res = await fetch("/api/orders", {
    headers: {
      "Authorization": `Bearer ${adminPassword}`
    }
  });

  if (!res.ok) {
    setStatus("Failed to load orders.", true);
    return;
  }

  const data = await res.json();
  const tbody = document.querySelector("#orders-table tbody");

  if (!tbody) return;

  tbody.innerHTML = "";

  data.forEach((order) => {
  const tr = document.createElement("tr");
  const normalizedStatus = String(order.status || "").trim().toLowerCase();

  tr.innerHTML = `
    <td>${order.id}</td>
    <td>${order.customer_name || ""}</td>
    <td>${order.customer_email || ""}</td>
    <td>$${Number(order.order_total || 0).toFixed(2)}</td>
    <td>${formatDate(order.created_at)}</td>
    <td>
      <select id="status-${order.id}" onchange="updateOrderStatus(${order.id})">
        <option value="pending" ${normalizedStatus === "pending" ? "selected" : ""}>Pending</option>
        <option value="paid" ${normalizedStatus === "paid" ? "selected" : ""}>Paid</option>
        <option value="processing" ${normalizedStatus === "processing" ? "selected" : ""}>Processing</option>
        <option value="shipped" ${normalizedStatus === "shipped" ? "selected" : ""}>Shipped</option>
        <option value="completed" ${normalizedStatus === "completed" ? "selected" : ""}>Completed</option>
        <option value="cancelled" ${normalizedStatus === "cancelled" ? "selected" : ""}>Cancelled</option>
      </select>
    </td>
    <td>
      <button onclick="toggleOrderDetails(${order.id}, this)">View</button>
    </td>
  `;

    const detailsTr = document.createElement("tr");
    detailsTr.id = `order-details-${order.id}`;
    detailsTr.className = "hidden";

    let itemsHtml = "<div>No items found.</div>";

try {
  let items = order.items_json;

  if (typeof items === "string") {
    items = JSON.parse(items);
  }

  if (!Array.isArray(items)) {
    items = [];
  }

  if (items.length) {
    itemsHtml = items.map((item) => `
      <div style="padding:8px 0; border-bottom:1px solid #2d2d2d;">
        <div><strong>${item.title || "Photo Print"}</strong></div>
        <div>Material: ${item.material || ""}</div>
        <div>Size: ${item.size || ""}</div>
        <div>Finish: ${item.finish || ""}</div>
        <div>Price: $${Number(item.price || 0).toFixed(2)}</div>
      </div>
    `).join("");
  }
} catch (err) {
  console.error("Order items parse error:", err, order.items_json);
  itemsHtml = "<div>Unable to read order items.</div>";
}

    detailsTr.innerHTML = `
      <td colspan="7" style="background:#101010; padding:16px;">
        <div style="margin-bottom:12px;">
          <strong>Phone:</strong> ${order.customer_phone || ""}<br>
          <strong>Address:</strong> ${order.customer_address || ""}<br>
          <strong>City:</strong> ${order.customer_city || ""}<br>
          <strong>State:</strong> ${order.customer_state || ""}<br>
          <strong>ZIP:</strong> ${order.customer_zip || ""}
        </div>

        <div>
          <strong>Items:</strong>
          <div style="margin-top:8px;">
            ${itemsHtml}
          </div>
        </div>
      </td>
    `;

    tbody.appendChild(tr);
    tbody.appendChild(detailsTr);
  });

  const totalRevenue = data.reduce(
  (sum, o) => sum + Number(o.order_total || 0),
  0
);

setStatus(
  `Loaded ${data.length} order(s) • Total Revenue: $${totalRevenue.toFixed(2)}`
);
}

function toggleOrderDetails(orderId, btn) {
  const row = document.getElementById(`order-details-${orderId}`);
  if (!row) return;

  const isHidden = row.classList.toggle("hidden");

  if (btn) {
    btn.textContent = isHidden ? "View" : "Hide";
  }
}

async function updateOrderStatus(orderId) {
  const select = document.getElementById(`status-${orderId}`);
  if (!select) return;

  const status = select.value;

  const res = await fetch(`/api/orders/${orderId}/status`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${adminPassword}`
    },
    body: JSON.stringify({ status })
  });

  if (!res.ok) {
    setStatus("Failed to update order status.", true);
    return;
  }

  setStatus(`Order #${orderId} status updated to ${status}.`);

  select.style.border = "1px solid #4CAF50";
  setTimeout(() => {
    select.style.border = "";
  }, 1000);
}

async function savePrice(id) {
  const input = document.getElementById(`price-${id}`);
  const price = Number(input.value);

  const res = await fetch(`/api/pricing/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${adminPassword}`
    },
    body: JSON.stringify({ price })
  });

  if (!res.ok) {
    setStatus("Failed to save price.", true);
    return;
  }

  setStatus("Price saved.");

  // ✅ visual feedback
  input.style.border = "1px solid #4CAF50";

  setTimeout(() => {
    input.style.border = "";
  }, 1000);

  // ✅ refresh table with latest DB data
  await loadPricing();
}

async function addPrice() {
  const material = document.getElementById("new-material").value.trim();
  const size = document.getElementById("new-size").value.trim();
  const price = Number(document.getElementById("new-price").value);

  if (!material || !size || Number.isNaN(price)) {
    setStatus("Please enter material, size, and a valid price.", true);
    return;
  }

  const res = await fetch("/api/pricing", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${adminPassword}`
    },
    body: JSON.stringify({ material, size, price })
  });

  if (!res.ok) {
    setStatus("Failed to add price.", true);
    return;
  }

  document.getElementById("new-material").value = "";
  document.getElementById("new-size").value = "";
  document.getElementById("new-price").value = "";

  setStatus("Price added.");
  loadPricing();
}

async function deletePrice(id) {
  const confirmed = confirm("Are you sure you want to delete this pricing row?");

  if (!confirmed) {
    return;
  }

  const res = await fetch(`/api/pricing/${id}`, {
    method: "DELETE",
    headers: {
      "Authorization": `Bearer ${adminPassword}`
    }
  });

  if (!res.ok) {
    setStatus("Failed to delete price.", true);
    return;
  }

  setStatus("Price deleted.");
  loadPricing();
}

function initializeAdmin() {
  const savedPassword = sessionStorage.getItem("adminPassword");

  if (savedPassword) {
    adminPassword = savedPassword;
    showAdminView();
    loadPricing();
  } else {
    showLoginView();
  }

  const passwordInput = document.getElementById("admin-password-input");
  passwordInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      login();
    }
  });
}

  function formatDate(dateStr) {
  if (!dateStr) return "";

  const date = new Date(dateStr);

  return date.toLocaleString(undefined, {
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

initializeAdmin();
initializeTabs();
</script>

</body>
</html>
