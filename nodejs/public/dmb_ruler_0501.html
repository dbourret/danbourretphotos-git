<!DOCTYPE html>
<html>
<head>
  <title>Admin Pricing</title>
  <style>
.metric-card {
  background: linear-gradient(180deg, #1b1b1b 0%, #131313 100%);
  border: 1px solid #2a2a2a;
  border-radius: 14px;
  padding: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.18);
}

.metric-label {
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #d6b36a;
  margin-bottom: 10px;
}

.metric-value {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
}

@media (max-width: 900px) {
  #orders-dashboard {
    grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
  }
}

@media (max-width: 560px) {
  #orders-dashboard {
    grid-template-columns: 1fr !important;
  }
}


    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 30px;
      margin: 0;
    }

    .hidden {
      display: none;
    }

    .card {
      max-width: 1100px;
      margin: 0 auto;
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px;
      box-sizing: border-box;
    }

    .login-card {
      max-width: 420px;
      margin: 80px auto;
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px;
      box-sizing: border-box;
    }

    h1, h2 {
      margin-top: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input {
      padding: 10px 12px;
      min-width: 120px;
      background: #101010;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      box-sizing: border-box;
    }

    #search-box {
      min-width: 260px;
    }

    button {
      padding: 10px 14px;
      cursor: pointer;
      border: 1px solid #444;
      border-radius: 8px;
      background: #222;
      color: #fff;
    }

    button:hover {
      background: #2b2b2b;
    }

    .danger {
      border-color: #6b2b2b;
    }

    .status {
      margin: 12px 0 18px;
      min-height: 20px;
      color: #d6b36a;
    }

    .error {
      color: #ff8f8f;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #141414;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #2d2d2d;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #1d1d1d;
    }

    .admin-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.tab-btn {
  padding: 10px 14px;
  cursor: pointer;
  border: 1px solid #444;
  border-radius: 8px;
  background: #222;
  color: #fff;
}

.tab-btn:hover {
  background: #2b2b2b;
}

.tab-btn.active {
  background: #d6b36a;
  color: #111;
  border-color: #d6b36a;
}

.tab-section {
  display: none;
}

.tab-section.active {
  display: block;
}

.status-select {
  margin-top: 6px;
  padding: 6px 8px;
  border-radius: 6px;
  border: 1px solid #444;
  font-size: 13px;
  font-weight: 600;
  opacity: 0.85;
  min-width: 140px;

  color: #fff;
  background-image: none;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}


/* Neutral */
.status-pending {
  background: #4b5563 !important;
  border-left: 10px solid #e5e7eb !important;
}

/* Blue + double border feel */
.status-paid {
  background: #0b3d91 !important;
  border-left: 10px solid #7dd3fc !important;
}

/* Amber + dark edge */
.status-processing {
  background: #8a4b00 !important;
  border-left: 10px solid #fcd34d !important;
}

/* Purple + white edge */
.status-shipped {
  background: #5b1fa6 !important;
  border-left: 10px solid #f5f3ff !important;
}

/* Green + bright edge */
.status-completed {
  background: #006644 !important;
  border-left: 10px solid #86efac !important;
}

/* Red + pale edge */
.status-cancelled {
  background: #a4161a !important;
  border-left: 10px solid #fecaca !important;
}

@media (max-width: 800px) {
  #orders-table td[colspan="7"] > div {
    grid-template-columns: 1fr !important;
  }
}

.status-select {
  border-left: 6px solid transparent;
}

.status-paid { border-left-color: #3b82f6; }
.status-processing { border-left-color: #f59e0b; }
.status-shipped { border-left-color: #a855f7; }
.status-completed { border-left-color: #10b981; }
.status-cancelled { border-left-color: #ef4444; }
.status-pending { border-left-color: #9ca3af; }
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  padding: 8px 12px;
  border-radius: 999px;
  border: 2px solid #ffffff;
  color: #ffffff;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3);
}

.order-filter-btn {
  padding: 10px 14px;
  border: 1px solid #444;
  border-radius: 999px;
  background: #1a1a1a;
  color: #fff;
  font-weight: 600;
}

.order-filter-btn:hover {
  background: #262626;
}

.order-filter-btn.active {
  background: #d6b36a;
  color: #111;
  border-color: #d6b36a;
}

  </style>
</head>
<body>

  <div id="login-view" class="login-card">
    <h1>Admin Login</h1>
    <p>Enter your admin password to manage pricing.</p>

    <div class="form-row" style="flex-direction: column;">
      <input type="password" id="admin-password-input" placeholder="Admin password">
      <button onclick="login()">Login</button>
    </div>

    <div id="login-status" class="status"></div>
  </div>

  <div id="admin-view" class="card hidden">
  <div class="topbar">
    <h1 style="margin:0;">Pricing Admin</h1>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="admin-tabs">
    <button class="tab-btn active" data-tab="pricing-tab">Pricing</button>
    <button class="tab-btn" data-tab="orders-tab">Orders</button>
    <button class="tab-btn" data-tab="contacts-tab">Contact Submissions</button>
  </div>

  <div id="admin-status" class="status"></div>

  <div id="pricing-tab" class="tab-section active">
    <h2>Add New Price</h2>

    <div class="form-row">
      <input type="text" id="new-material" placeholder="Material">
      <input type="text" id="new-size" placeholder="Size">
      <input type="number" id="new-price" placeholder="Price" step="0.01">
      <button onclick="addPrice()">Add Price</button>
    </div>

    <div style="margin: 20px 0;">
      <input
        type="text"
        id="search-box"
        placeholder="Search by material or size"
        oninput="loadPricing()"
      >
    </div>

    <table id="pricing-table">
      <thead>
        <tr>
          <th>Material</th>
          <th>Size</th>
          <th>Price</th>
          <th>Save</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="orders-tab" class="tab-section">
    <h2 style="margin-top: 36px;">Orders</h2>

    <div style="margin: 12px 0 18px;">
      <button onclick="loadOrders()">Refresh Orders</button>
    </div>

<div id="orders-dashboard" style="
  display:grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap:14px;
  margin: 0 0 18px;
">
  <div class="metric-card">
    <div class="metric-label">Total Orders</div>
    <div class="metric-value" id="metric-total-orders">0</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Revenue</div>
    <div class="metric-value" id="metric-revenue">$0.00</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Shipped</div>
    <div class="metric-value" id="metric-shipped">0</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Completed</div>
    <div class="metric-value" id="metric-completed">0</div>
  </div>
</div>

<div id="order-filters" style="display:flex; gap:10px; flex-wrap:wrap; margin:0 0 18px;">
  <button class="order-filter-btn active" data-status="all" onclick="setOrderFilter('all', this)">All</button>
  <button class="order-filter-btn" data-status="paid" onclick="setOrderFilter('paid', this)">Paid</button>
  <button class="order-filter-btn" data-status="processing" onclick="setOrderFilter('processing', this)">Processing</button>
  <button class="order-filter-btn" data-status="shipped" onclick="setOrderFilter('shipped', this)">Shipped</button>
  <button class="order-filter-btn" data-status="completed" onclick="setOrderFilter('completed', this)">Completed</button>
  <button class="order-filter-btn" data-status="cancelled" onclick="setOrderFilter('cancelled', this)">Cancelled</button>
</div>

    <table id="orders-table">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer</th>
          <th>Email</th>
          <th>Total</th>
          <th>Date</th>
          <th>Status</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="contacts-tab" class="tab-section">
  <h2>Contact Submissions</h2>

  <div style="margin: 12px 0 18px;">
    <button onclick="loadContactSubmissions()">Refresh Contact Submissions</button>
  </div>

  <table id="contact-submissions-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Subject</th>
        <th>Date</th>
        <th>Message</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
let adminPassword = "";
let currentOrderFilter = "all";

function initializeTabs() {
        console.log("initializeTabs ran");

  const buttons = document.querySelectorAll(".tab-btn");
  const sections = document.querySelectorAll(".tab-section");

  buttons.forEach(btn => {
    btn.addEventListener("click", async () => {
            console.log("tab clicked:", btn.dataset.tab);

      buttons.forEach(b => b.classList.remove("active"));
      sections.forEach(s => s.classList.remove("active"));

      btn.classList.add("active");

      const target = btn.dataset.tab;
      const section = document.getElementById(target);

      if (section) {
        section.classList.add("active");
      }

      if (target === "orders-tab") {
        await loadOrders();
      }

      if (target === "contacts-tab") {
  await loadContactSubmissions();
}

      if (target === "pricing-tab") {
        await loadPricing();
      }
    });
  });
}

function setStatus(message, isError = false, targetId = "admin-status") {
  const el = document.getElementById(targetId);
  if (!el) return;

  el.textContent = message || "";
  el.classList.toggle("error", isError);
}

function showAdminView() {
  document.getElementById("login-view").classList.add("hidden");
  document.getElementById("admin-view").classList.remove("hidden");
}

function showLoginView() {
  document.getElementById("admin-view").classList.add("hidden");
  document.getElementById("login-view").classList.remove("hidden");
}

async function login() {
  const passwordInput = document.getElementById("admin-password-input");
  const password = passwordInput.value.trim();

  if (!password) {
    setStatus("Please enter your password.", true, "login-status");
    return;
  }

  adminPassword = password;

  const res = await fetch("/api/orders", {
    headers: {
      "Authorization": `Bearer ${adminPassword}`
    }
  });

  if (!res.ok) {
    if (res.status === 401 || res.status === 403) {
      setStatus("Login failed. Check your password.", true, "login-status");
      return;
    }

    setStatus("Login failed due to a server error.", true, "login-status");
    return;
  }

  sessionStorage.setItem("adminPassword", adminPassword);
  passwordInput.value = "";
  setStatus("", false, "login-status");
  showAdminView();
  setStatus("Logged in successfully.");
  loadPricing();
}

function logout() {
  adminPassword = "";
  sessionStorage.removeItem("adminPassword");
  showLoginView();
  setStatus("", false, "admin-status");
  setStatus("Logged out.", false, "login-status");
}

async function loadPricing() {
  const res = await fetch("/api/pricing", {
    headers: {
      "Authorization": `Bearer ${adminPassword}`
    }
  });

  if (!res.ok) {
    if (res.status === 401 || res.status === 403) {
      logout();
      setStatus("Your session expired. Please log in again.", true, "login-status");
      return;
    }

    setStatus("Failed to load pricing.", true);
    return;
  }

  const data = await res.json();
  const searchTerm = document.getElementById("search-box")?.value.toLowerCase().trim() || "";

  const filteredData = data.filter(row => {
    const material = String(row.material || "").toLowerCase();
    const size = String(row.size || "").toLowerCase();
    return material.includes(searchTerm) || size.includes(searchTerm);
  });

  const tbody = document.querySelector("#pricing-table tbody");
  tbody.innerHTML = "";

  filteredData.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.material}</td>
      <td>${row.size}</td>
      <td>
        <input type="number" step="0.01" value="${row.price}" id="price-${row.id}">
      </td>
      <td>
        <button onclick="savePrice(${row.id})">Save</button>
      </td>
      <td>
        <button class="danger" onclick="deletePrice(${row.id})">Delete</button>
      </td>
    `;

    tbody.appendChild(tr);
  });

  setStatus(`Loaded ${filteredData.length} pricing row(s).`);
}

async function loadContactSubmissions() {
  console.log("Loading contact submissions...");

  const res = await fetch("/api/contact-submissions", {
    headers: {
      "Authorization": `Bearer ${adminPassword}`
    }
  });

  if (!res.ok) {
    if (res.status === 401 || res.status === 403) {
      logout();
      setStatus("Session expired. Please log in again.", true);
      return;
    }

    setStatus("Failed to load contact submissions.", true);
    return;
  }

  const data = await res.json();

  console.log("Contact submissions:", data);

  const tbody = document.querySelector("#contact-submissions-table tbody");
  if (!tbody) return;

  tbody.innerHTML = "";

  data.forEach((submission) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${submission.id || ""}</td>
      <td>${submission.name || ""}</td>
      <td>${submission.email || ""}</td>
      <td>${submission.subject || ""}</td>
      <td>${formatDate(submission.created_at)}</td>
      <td style="max-width: 320px; white-space: pre-wrap;">${submission.message || ""}</td>
    `;

    tbody.appendChild(tr);
  });

  setStatus(`Loaded ${data.length} contact submission(s).`);
}

async function loadOrders() {
  const res = await fetch("/api/orders", {
    headers: {
      "Authorization": `Bearer ${adminPassword}`
    }

    
  });

  if (!res.ok) {
    setStatus("Failed to load orders.", true);
    return;
  }

  const data = await res.json();
  const filteredOrders =
  currentOrderFilter === "all"
    ? data
    : data.filter(order =>
        String(order.status || "").trim().toLowerCase() === currentOrderFilter
      );
  const tbody = document.querySelector("#orders-table tbody");

  if (!tbody) return;

  tbody.innerHTML = "";

  filteredOrders.forEach((order) => {
    console.log("order id/status =", order.id, order.status);
    const tr = document.createElement("tr");
  const normalizedStatus = String(order.status || "").trim().toLowerCase();

  tr.innerHTML = `
    <td>${order.id}</td>
    <td>${order.customer_name || ""}</td>
    <td>${order.customer_email || ""}</td>
    <td>$${Number(order.order_total || 0).toFixed(2)}</td>
    <td>${formatDate(order.created_at)}</td>
  <td>
  <div class="status-badge status-${normalizedStatus}" id="badge-${order.id}">
    ${getStatusLabel(normalizedStatus)}
  </div>

  <select
    id="status-${order.id}"
    class="status-select status-${normalizedStatus}"
    onchange="updateOrderStatus(${order.id}); updateStatusColor(${order.id})"
  >
    <option value="pending" ${normalizedStatus === "pending" ? "selected" : ""}>⏳ PENDING</option>
    <option value="paid" ${normalizedStatus === "paid" ? "selected" : ""}>💳 PAID</option>
    <option value="processing" ${normalizedStatus === "processing" ? "selected" : ""}>⚙️ PROCESSING</option>
    <option value="shipped" ${normalizedStatus === "shipped" ? "selected" : ""}>📦 SHIPPED</option>
    <option value="completed" ${normalizedStatus === "completed" ? "selected" : ""}>✅ COMPLETED</option>
    <option value="cancelled" ${normalizedStatus === "cancelled" ? "selected" : ""}>✖ CANCELLED</option>
  </select>

  <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
    <button onclick="setOrderStatus(${order.id}, 'shipped')">Mark Shipped</button>
    <button onclick="setOrderStatus(${order.id}, 'completed')">Mark Completed</button>
  </div>
</td>
<td>
  <button onclick="toggleOrderDetails(${order.id}, this)">View</button>
</td>
  `;

    const detailsTr = document.createElement("tr");
    detailsTr.id = `order-details-${order.id}`;
    detailsTr.className = "hidden";

    let itemsHtml = "<div>No items found.</div>";

try {
  let items = order.items_json;

  if (typeof items === "string") {
    items = JSON.parse(items);
  }

  if (!Array.isArray(items)) {
    items = [];
  }

  if (items.length) {
    itemsHtml = items.map((item) => `
  <div style="
    padding:14px;
    border:1px solid #2a2a2a;
    border-radius:12px;
    background:#161616;
  ">
    <div style="
      font-size:16px;
      font-weight:700;
      color:#ffffff;
      margin-bottom:8px;
    ">
      ${item.title || "Photo Print"}
    </div>

    <div style="
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:8px 16px;
      color:#d7d7d7;
      font-size:14px;
      line-height:1.6;
    ">
      <div><strong>Material:</strong> ${item.material || ""}</div>
      <div><strong>Size:</strong> ${item.size || ""}</div>
      <div><strong>Finish:</strong> ${item.finish || ""}</div>
      <div><strong>Price:</strong> $${Number(item.price || 0).toFixed(2)}</div>
    </div>
  </div>
`).join("");
  }
} catch (err) {
  console.error("Order items parse error:", err, order.items_json);
  itemsHtml = "<div>Unable to read order items.</div>";
}

    detailsTr.innerHTML = `
  <td colspan="7" style="background:#0d0d0d; padding:20px;">
    <div style="
      display:grid;
      grid-template-columns: 1fr 1.4fr;
      gap:20px;
      background:#151515;
      border:1px solid #2a2a2a;
      border-radius:14px;
      padding:20px;
    ">
      <div style="
        background:#101010;
        border:1px solid #262626;
        border-radius:12px;
        padding:16px;
      ">
        <div style="
          font-size:12px;
          letter-spacing:0.12em;
          text-transform:uppercase;
          color:#d6b36a;
          margin-bottom:12px;
        ">
          Customer Details
        </div>

        <div style="line-height:1.8; color:#e9e9e9;">
          <div><strong>Name:</strong> ${order.customer_name || ""}</div>
          <div><strong>Email:</strong> ${order.customer_email || ""}</div>
          <div><strong>Phone:</strong> ${order.customer_phone || ""}</div>
          <div><strong>Address:</strong> ${order.customer_address || ""}</div>
          <div><strong>City:</strong> ${order.customer_city || ""}</div>
          <div><strong>State:</strong> ${order.customer_state || ""}</div>
          <div><strong>ZIP:</strong> ${order.customer_zip || ""}</div>
        </div>
      </div>

      <div style="
        background:#101010;
        border:1px solid #262626;
        border-radius:12px;
        padding:16px;
      ">
        <div style="
          font-size:12px;
          letter-spacing:0.12em;
          text-transform:uppercase;
          color:#d6b36a;
          margin-bottom:12px;
        ">
          Ordered Items
        </div>

        <div style="display:grid; gap:12px;">
          ${itemsHtml}
        </div>
      </div>
    </div>
  </td>
`;

    tbody.appendChild(tr);
    tbody.appendChild(detailsTr);
  });

  const totalRevenue = data.reduce(
  (sum, o) => sum + Number(o.order_total || 0),
  0
);

const shippedCount = data.filter(o =>
  String(o.status || "").trim().toLowerCase() === "shipped"
).length;

const completedCount = data.filter(o =>
  String(o.status || "").trim().toLowerCase() === "completed"
).length;

document.getElementById("metric-total-orders").textContent = data.length;
document.getElementById("metric-revenue").textContent = `$${totalRevenue.toFixed(2)}`;
document.getElementById("metric-shipped").textContent = shippedCount;
document.getElementById("metric-completed").textContent = completedCount;

setStatus(
  `Showing ${filteredOrders.length} of ${data.length} order(s) • Total Revenue: $${totalRevenue.toFixed(2)}`
);
}

function toggleOrderDetails(orderId, btn) {
  const row = document.getElementById(`order-details-${orderId}`);
  if (!row) return;

  const isHidden = row.classList.toggle("hidden");

  if (btn) {
    btn.textContent = isHidden ? "View Details" : "Hide Details";
  }
}

function setOrderFilter(status, btn) {
  currentOrderFilter = status;

  document.querySelectorAll(".order-filter-btn").forEach(button => {
    button.classList.remove("active");
  });

  if (btn) {
    btn.classList.add("active");
  }

  loadOrders();
}


async function updateOrderStatus(orderId) {
  const select = document.getElementById(`status-${orderId}`);
  if (!select) return;

  const status = select.value;

  const res = await fetch(`/api/orders/${orderId}/status`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${adminPassword}`
    },
    body: JSON.stringify({ status })
  });

  if (!res.ok) {
    setStatus("Failed to update order status.", true);
    return;
  }

  setStatus(`Order #${orderId} status updated to ${status}.`);

  select.style.border = "1px solid #4CAF50";
  setTimeout(() => {
    select.style.border = "";
  }, 1000);
}

async function setOrderStatus(orderId, newStatus) {
  const select = document.getElementById(`status-${orderId}`);
  if (!select) return;

  select.value = newStatus;
  updateStatusColor(orderId);
  await updateOrderStatus(orderId);
}

async function savePrice(id) {
  const input = document.getElementById(`price-${id}`);
  const price = Number(input.value);

  const res = await fetch(`/api/pricing/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${adminPassword}`
    },
    body: JSON.stringify({ price })
  });

  if (!res.ok) {
    setStatus("Failed to save price.", true);
    return;
  }

  setStatus("Price saved.");

  // ✅ visual feedback
  input.style.border = "1px solid #4CAF50";

  setTimeout(() => {
    input.style.border = "";
  }, 1000);

  // ✅ refresh table with latest DB data
  await loadPricing();
}

async function addPrice() {
  const material = document.getElementById("new-material").value.trim();
  const size = document.getElementById("new-size").value.trim();
  const price = Number(document.getElementById("new-price").value);

  if (!material || !size || Number.isNaN(price)) {
    setStatus("Please enter material, size, and a valid price.", true);
    return;
  }

  const res = await fetch("/api/pricing", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${adminPassword}`
    },
    body: JSON.stringify({ material, size, price })
  });

  if (!res.ok) {
    setStatus("Failed to add price.", true);
    return;
  }

  document.getElementById("new-material").value = "";
  document.getElementById("new-size").value = "";
  document.getElementById("new-price").value = "";

  setStatus("Price added.");
  loadPricing();
}

async function deletePrice(id) {
    console.log("LOCAL DELETE CLICKED");
  console.log("origin =", window.location.origin);
  console.log("delete url =", `/api/pricing/${id}`);
  const confirmed = confirm("Are you sure you want to delete this pricing row?");

    setStatus("Failed to delete price.", true);

}

function initializeAdmin() {
  const savedPassword = sessionStorage.getItem("adminPassword");

  if (savedPassword) {
    adminPassword = savedPassword;
    showAdminView();
    loadPricing();
  } else {
    showLoginView();
  }

  const passwordInput = document.getElementById("admin-password-input");
  passwordInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      login();
    }
  });
}

function getStatusLabel(status) {
  switch (status) {
    case "pending":
      return "⏳ Pending";
    case "paid":
      return "💳 Paid";
    case "processing":
      return "⚙️ Processing";
    case "shipped":
      return "📦 Shipped";
    case "completed":
      return "✅ Completed";
    case "cancelled":
      return "✖ Cancelled";
    default:
      return status || "Unknown";
  }
}
  
function updateStatusColor(orderId) {
  const select = document.getElementById(`status-${orderId}`);
  if (!select) return;

  const status = select.value;

  // reset classes
  select.className = "status-select status-" + status;
}
function formatDate(dateStr) {
  if (!dateStr) return "";

  const date = new Date(dateStr);

  return date.toLocaleString(undefined, {
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

initializeAdmin();
initializeTabs();
